name: Writer CLI Release

on:
  push:
    tags:
      - "writer-cli-v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. writer-cli-v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish CLI binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release artifacts
        working-directory: packages/cli
        run: bun run build:release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: Writer CLI ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            packages/cli/dist/writer-darwin-arm64
            packages/cli/dist/writer-darwin-x64
            packages/cli/dist/writer-linux-arm64
            packages/cli/dist/writer-linux-x64
            packages/cli/dist/SHA256SUMS
          generate_release_notes: true
