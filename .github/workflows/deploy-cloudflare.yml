name: Deploy Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-cloudflare.yml"
      - "bun.lock"
      - "package.json"
      - "packages/previewer/**"
      - "packages/server/**"
      - "packages/db/**"
      - "packages/utils/**"
  workflow_dispatch:
    inputs:
      service:
        description: "Worker to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - previewer
          - server

permissions:
  contents: read

concurrency:
  group: cloudflare-workers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changed Workers
    runs-on: ubuntu-latest
    outputs:
      previewer: ${{ steps.filter.outputs.previewer }}
      server: ${{ steps.filter.outputs.server }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            previewer:
              - '.github/workflows/deploy-cloudflare.yml'
              - 'bun.lock'
              - 'package.json'
              - 'packages/previewer/**'
            server:
              - '.github/workflows/deploy-cloudflare.yml'
              - 'bun.lock'
              - 'package.json'
              - 'packages/server/**'
              - 'packages/db/**'
              - 'packages/utils/**'

  deploy-previewer:
    name: Deploy previewer
    needs: changes
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' &&
        (inputs.service == 'all' || inputs.service == 'previewer') ||
        github.event_name == 'push' && needs.changes.outputs.previewer == 'true'
      }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck previewer
        working-directory: packages/previewer
        run: bun run typecheck

      - name: Deploy previewer
        working-directory: packages/previewer
        run: bun run deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-server:
    name: Deploy server
    needs: changes
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' &&
        (inputs.service == 'all' || inputs.service == 'server') ||
        github.event_name == 'push' && needs.changes.outputs.server == 'true'
      }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck database package
        working-directory: packages/db
        run: bunx tsc --noEmit

      - name: Typecheck server
        working-directory: packages/server
        run: bun run typecheck

      - name: Deploy server
        working-directory: packages/server
        run: bun run deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
